<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Cleaner Service Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.3/font/bootstrap-icons.css">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8f9fa;
            padding-top: 40px;
            padding-bottom: 40px;
        }

        .form-signin {
            width: 100%;
            max-width: 400px;
            padding: 15px;
            margin: auto;
        }

        .form-signin .card {
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        .logo-img {
            max-width: 80px;
            margin-bottom: 20px;
        }

        .card-body {
            padding: 30px;
        }

        .form-floating {
            margin-bottom: 15px;
        }

        .btn-primary {
            background-color: #3498db;
            border-color: #3498db;
        }

        .btn-primary:hover {
            background-color: #2980b9;
            border-color: #2980b9;
        }

        /* Error message styling */
        .alert-danger {
            background-color: #f8d7da;
            color: #721c24;
            border-color: #f5c6cb;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>
    <main class="form-signin">
        <div class="card">
            <div class="card-body">
                <div class="text-center mb-4">
                    <h1 class="h3 mb-3 fw-normal">Cleaner Service Management</h1>
                    <p class="text-muted">Please sign in to continue</p>
                </div>

                {% if message %}
                <div class="alert alert-danger">{{ message }}</div>
                {% endif %}

                <form method="POST" action="/">
                    <div class="form-group mb-3">
                        <label for="profile_id">Profile Type:</label>
                        <select id="profile_id" name="profile_id" class="form-select">
                            {% for profile in profiles %}
                            <option value="{{ profile[0] }}">{{ profile[1] }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="form-floating mb-3">
                        <input type="text" class="form-control" id="username" name="username" placeholder="Username"
                            required>
                        <label for="username">Username</label>
                    </div>

                    <div class="form-floating mb-4">
                        <input type="password" class="form-control" id="password" name="password" placeholder="Password"
                            required>
                        <label for="password">Password</label>
                    </div>

                    <button class="w-100 btn btn-lg btn-primary" type="submit">
                        <i class="bi bi-box-arrow-in-right"></i> Sign in
                    </button>
                </form>
            </div>
        </div>
        <p class="mt-4 text-center text-muted">&copy; 2025 Cleaner Service Management</p>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
